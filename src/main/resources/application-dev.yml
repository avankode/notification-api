spring:
  datasource:
    url: jdbc:postgresql://notification_db:5432/notification_platform?sslmode=disable
    username: ${DB_LOCAL_USER}
    password: ${DB_LOCAL_PASSWORD}
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: ${RABBITMQ_LOCAL_HOST}
    port: ${RABBITMQ_LOCAL_PORT}
    username: ${RABBITMQ_LOCAL_USER}
    password: ${RABBITMQ_LOCAL_PASSWORD}